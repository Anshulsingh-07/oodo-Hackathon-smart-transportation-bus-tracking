apiVersion: apps/v1
kind: Deployment
metadata:
  name: transitops-api
  labels:
    app: transitops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: transitops
  template:
    metadata:
      labels:
        app: transitops
    spec:
      containers:
      - name: api
        image: transitops/api:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: jwt-secret
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"